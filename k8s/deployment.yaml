apiVersion: apps/v1
kind: Deployment
metadata:
  name: tabula-rasa-api
  labels:
    app: tabula-rasa
    tier: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tabula-rasa
      tier: api
  template:
    metadata:
      labels:
        app: tabula-rasa
        tier: api
    spec:
      containers:
        - name: api
          image: tabula-rasa:latest
          ports:
            - containerPort: 8000
          command: ["python", "api_server.py"]
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            requests:
              memory: "2Gi"
              cpu: "2"
            limits:
              memory: "4Gi"
              cpu: "4"
          volumeMounts:
            - name: specialists
              mountPath: /app/specialists
            - name: memory
              mountPath: /app/memory
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: tabula-rasa-api
spec:
  selector:
    app: tabula-rasa
    tier: api
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tabula-rasa-sleep
  labels:
    app: tabula-rasa
    tier: sleep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tabula-rasa
      tier: sleep
  template:
    metadata:
      labels:
        app: tabula-rasa
        tier: sleep
    spec:
      containers:
        - name: sleep
          image: tabula-rasa:latest
          command: ["python", "egefalos/sleep_cycle.py", "--daemon", "--interval", "3600"]
          resources:
            requests:
              memory: "1Gi"
              cpu: "1"
            limits:
              memory: "2Gi"
              cpu: "2"
          volumeMounts:
            - name: specialists
              mountPath: /app/specialists
            - name: memory
              mountPath: /app/memory
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tabula-rasa-specialists
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tabula-rasa-memory
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
