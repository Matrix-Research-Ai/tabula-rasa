<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token Inspector</title>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --border: #334155; --text: #f1f5f9; --muted: #94a3b8; --accent: #3b82f6; --green: #22c55e; --orange: #f59e0b; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); padding: 24px 32px; max-width: 960px; margin: 0 auto; }
        h2 { border-bottom: 1px solid var(--border); padding-bottom: 12px; margin-bottom: 20px; font-size: 1.4rem; }
        h3 { font-size: 1rem; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 18px; margin-bottom: 16px; }
        .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
        .g4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px; }
        label { display: block; font-size: 0.75rem; color: var(--muted); margin-bottom: 3px; }
        input, textarea { width: 100%; background: #0f172a; border: 1px solid var(--border); color: white; padding: 8px 10px; border-radius: 6px; font-size: 0.85rem; font-family: monospace; outline: none; }
        textarea { min-height: 50px; resize: vertical; }
        .btn { padding: 8px 18px; border-radius: 6px; border: none; font-weight: 600; cursor: pointer; font-size: 0.85rem; }
        .btn-p { background: var(--accent); color: white; }
        .stat-box { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 12px; text-align: center; }
        .stat-box .v { font-size: 1.3rem; font-weight: bold; }
        .stat-box .l { font-size: 0.7rem; color: #9ca3af; text-transform: uppercase; margin-top: 2px; }
        .token-grid { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
        .token-chip { background: rgba(59,130,246,0.15); border: 1px solid rgba(59,130,246,0.3); border-radius: 4px; padding: 4px 8px; font-family: monospace; font-size: 0.8rem; display: flex; flex-direction: column; align-items: center; }
        .token-chip .id { font-size: 0.6rem; color: var(--muted); }
        .token-chip .chr { font-weight: 600; color: var(--accent); font-size: 0.9rem; }
    </style>
</head>
<body>
    <h2>Token Inspector</h2>
    <div class="g2">
        <div class="card">
            <h3>Encode</h3>
            <label>Text to tokenize</label>
            <textarea id="encode-input">12+34=46</textarea>
            <div style="margin-top:8px;display:flex;gap:8px;align-items:center;">
                <button class="btn btn-p" onclick="encode()">Encode</button>
                <span style="font-size:0.75rem;color:var(--muted);">Tokens: <strong id="encode-count" style="color:white;">0</strong></span>
            </div>
            <div class="token-grid" id="encode-result"></div>
        </div>
        <div class="card">
            <h3>Decode</h3>
            <label>Token IDs (comma separated)</label>
            <textarea id="decode-input">1,2,14,4,11,5,18</textarea>
            <div style="margin-top:8px;"><button class="btn btn-p" onclick="decode()">Decode</button></div>
            <div style="margin-top:8px;background:#0f172a;border:1px solid var(--border);border-radius:6px;padding:10px;font-family:monospace;font-size:1rem;color:var(--green);" id="decode-result">-</div>
        </div>
    </div>
    <div class="g4">
        <div class="stat-box"><div class="v" id="vocab-size" style="color:var(--accent);">24</div><div class="l">Vocab Size</div></div>
        <div class="stat-box"><div class="v" id="seq-len" style="color:var(--green);">64</div><div class="l">Max Seq Len</div></div>
        <div class="stat-box"><div class="v" id="spec-tokens" style="color:var(--orange);">4</div><div class="l">Special Tokens</div></div>
        <div class="stat-box"><div class="v" id="bpe-merges" style="color:var(--muted);">0</div><div class="l">BPE Merges</div></div>
    </div>
    <div class="card">
        <h3>Vocabulary Table</h3>
        <div style="display:grid;grid-template-columns:repeat(8,1fr);gap:3px;" id="vocab-table"></div>
    </div>
    <script>
    var API='http://localhost:8000';
    var TOKENS=[];
    TOKENS[0]='<PAD>';TOKENS[1]='<BOS>';TOKENS[2]='<EOS>';TOKENS[3]='<UNK>';
    TOKENS[4]='0';TOKENS[5]='1';TOKENS[6]='2';TOKENS[7]='3';TOKENS[8]='4';TOKENS[9]='5';
    TOKENS[10]='6';TOKENS[11]='7';TOKENS[12]='8';TOKENS[13]='9';TOKENS[14]='+';TOKENS[15]='-';
    TOKENS[16]='*';TOKENS[17]='/';TOKENS[18]='=';TOKENS[19]='(';TOKENS[20]=')';TOKENS[21]='.';
    TOKENS[22]='%';TOKENS[23]=' ';
    var REV={};
    for(var i=0;i<TOKENS.length;i++)if(TOKENS[i])REV[TOKENS[i]]=i;

    function renderVocab(){
        var h='';
        for(var i=0;i<24;i++){
            var c=TOKENS[i]||'<UNK>';
            var d=c==' '?'SPC':c=='<PAD>'?'PAD':c=='<BOS>'?'BOS':c=='<EOS>'?'EOS':c=='<UNK>'?'UNK':c;
            h+='<div style="background:#0f172a;border:1px solid var(--border);border-radius:4px;padding:6px;text-align:center;">';
            h+='<div style="font-size:0.6rem;color:var(--muted);">'+i+'</div>';
            h+='<div style="font-weight:600;color:var(--accent);font-size:0.95rem;">'+d+'</div></div>';
        }
        document.getElementById('vocab-table').innerHTML=h;
    }

    function encode(){
        var t=document.getElementById('encode-input').value;
        var ids=[];
        for(var i=0;i<t.length;i++){
            var id=REV[t[i]];
            if(id===undefined)id=3;
            ids.push(id);
        }
        var h='';
        ids.forEach(function(id){
            var c=TOKENS[id]||'?';
            var d=c==' '?'SPC':c=='<PAD>'?'PAD':c=='<BOS>'?'BOS':c=='<EOS>'?'EOS':c;
            h+='<div class="token-chip"><span class="chr">'+d+'</span><span class="id">'+id+'</span></div>';
        });
        document.getElementById('encode-result').innerHTML=h;
        document.getElementById('encode-count').textContent=ids.length;
    }

    function decode(){
        var t=document.getElementById('decode-input').value.trim();
        var parts=t.split(',').map(function(s){return parseInt(s.trim());});
        var text='';
        parts.forEach(function(id){text+=TOKENS[id]||'?';});
        document.getElementById('decode-result').textContent=text||'(empty)';
    }

    function loadAPI(){
        fetch(API+'/health').then(function(r){return r.json()}).then(function(d){
            if(d.vocab_size)document.getElementById('vocab-size').textContent=d.vocab_size;
            if(d.max_seq_len)document.getElementById('seq-len').textContent=d.max_seq_len;
        }).catch(function(){});
    }

    renderVocab();loadAPI();encode();
    </script>
</body>
</html>
