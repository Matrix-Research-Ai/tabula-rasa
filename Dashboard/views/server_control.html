<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Server Control</title>
<style>
:root { --bg: #0f172a; --panel: #1e293b; --border: #334155; --text: #f1f5f9; --muted: #94a3b8; --accent: #3b82f6; --accent-hover: #2563eb; --green: #22c55e; --orange: #f59e0b; --red: #ef4444; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace; background: var(--bg); color: var(--text); padding: 20px; }
h1 { font-size: 18px; margin-bottom: 16px; }
.card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; margin-bottom: 14px; }
.card h2 { font-size: 14px; font-weight: 600; margin-bottom: 10px; color: var(--accent); }
.row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 12px; border-bottom: 1px solid var(--border); }
.row:last-child { border: none; }
.row .l { color: var(--muted); } .row .v { font-weight: 500; }
.v.on { color: var(--green); } .v.off { color: var(--red); } .v.warn { color: var(--orange); }
.btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 24px; border-radius: 8px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; transition: opacity .12s; margin: 4px; }
.btn:hover { opacity: .85; }
.btn.primary { background: var(--accent); color: #fff; }
.btn.danger { background: var(--red); color: #fff; }
.btn:disabled { opacity: .4; cursor: not-allowed; }
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--muted); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
#statusDot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
#statusDot.on { background: var(--green); box-shadow: 0 0 8px var(--green); }
#statusDot.off { background: var(--red); box-shadow: 0 0 8px var(--red); }
#statusDot.starting { background: var(--orange); animation: pulse 1s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
#restartMsg { padding: 8px 14px; border-radius: 6px; font-size: 12px; margin-top: 10px; display: none; }
#restartMsg.ok{background:rgba(63,185,80,.12);color:var(--green);border:1px solid var(--green);display:block}
#restartMsg.err{background:rgba(248,81,73,.12);color:var(--red);border:1px solid var(--red);display:block}
#restartMsg.info{background:rgba(88,166,255,.12);color:var(--accent);border:1px solid var(--accent);display:block}
</style>
</head>
<body>
<h1>&#x1F5A5; Server Control</h1>

<div class="card">
<h2>&#x1F4A1; Status</h2>
<div id="statusDisplay">
  <div class="row"><span class="l">Server</span><span class="v" id="serverState">checking...</span></div>
  <div class="row"><span class="l">PID</span><span class="v" id="serverPid">-</span></div>
  <div class="row"><span class="l">Uptime</span><span class="v" id="serverUptime">-</span></div>
  <div class="row"><span class="l">Port</span><span class="v" id="serverPort">8000</span></div>
  <div class="row"><span class="l">Model Loaded</span><span class="v" id="serverModel">-</span></div>
</div>
</div>

<div class="card">
<h2>&#x2699; Actions</h2>
<div style="display:flex;flex-wrap:wrap;gap:6px;padding-top:4px">
  <button class="btn primary" id="restartBtn" onclick="restartServer()">&#x21BB; Restart Server</button>
  <button class="btn" id="refreshBtn" onclick="checkStatus()" style="border:1px solid var(--border);background:transparent;color:var(--text)">&#x21BB; Refresh Status</button>
</div>
<div id="restartMsg"></div>
</div>

<div class="card">
<h2>&#x1F4DD; Recent Log</h2>
<pre id="logPreview" style="font-size:11px;color:var(--muted);max-height:200px;overflow-y:auto;white-space:pre-wrap;line-height:1.5;background:var(--bg);padding:10px;border-radius:6px;border:1px solid var(--border)">(no log data)</pre>
</div>

<script>
let lastPid = null;
let checkInterval = null;

async function checkStatus() {
  const el = (id) => document.getElementById(id);
  const state = el('serverState');
  const pid = el('serverPid');
  const uptime = el('serverUptime');
  const model = el('serverModel');
  const msg = el('restartMsg');
  const log = el('logPreview');

  msg.style.display = 'none';
  state.innerHTML = '<span class="spinner"></span> checking...';

  try {
    const r = await fetch('/server-status?' + Date.now());
    if (!r.ok) throw new Error(r.status);
    const d = await r.json();

    state.innerHTML = '<span id="statusDot" class="on"></span> Running';
    pid.textContent = d.pid;
    const up = d.uptime_seconds;
    const h = Math.floor(up / 3600);
    const m = Math.floor((up % 3600) / 60);
    const s = Math.floor(up % 60);
    uptime.textContent = h > 0 ? h+'h '+m+'m '+s+'s' : m > 0 ? m+'m '+s+'s' : s+'s';
    el('serverPort').textContent = d.port;
    model.textContent = d.model_loaded ? 'yes' : 'no';

    lastPid = d.pid;
  } catch (e) {
    state.innerHTML = '<span id="statusDot" class="off"></span> Offline / Not Responding';
    pid.textContent = '-';
    uptime.textContent = '-';
    model.textContent = '-';
    lastPid = null;
  }

  // Load log preview
  try {
    const r2 = await fetch('/training-log?' + Date.now());
    if (r2.ok) {
      const text = await r2.text();
      const lines = text.trim().split('\n');
      log.textContent = lines.slice(-15).join('\n') || '(empty log)';
    } else {
      log.textContent = '(no training log)';
    }
  } catch {
    log.textContent = '(unreachable)';
  }
}

async function restartServer() {
  const btn = document.getElementById('restartBtn');
  const msg = document.getElementById('restartMsg');
  btn.disabled = true;
  msg.className = 'info';
  msg.textContent = 'Restarting server... please wait.';
  msg.style.display = 'block';

  try {
    // Fire restart — server will respond then die
    const r = await fetch('/restart?' + Date.now(), { method: 'GET' });
    const d = await r.json();
    msg.textContent = 'Old server (PID ' + d.pid + ') shutting down, new process starting...';
  } catch (e) {
    // Expected: connection reset as old server dies
    msg.textContent = 'Old server shut down. Waiting for new server...';
  }

  // Poll for new server to come up
  let attempts = 0;
  const maxAttempts = 20;
  const poll = setInterval(async () => {
    attempts++;
    try {
      const r = await fetch('/server-status?' + Date.now());
      if (r.ok) {
        const d2 = await r.json();
        clearInterval(poll);
        msg.className = 'ok';
        msg.textContent = 'Server restarted! New PID: ' + d2.pid + ' (old was: ' + (lastPid || '?') + ')';
        btn.disabled = false;
        checkStatus();
        return;
      }
    } catch {}
    if (attempts >= maxAttempts) {
      clearInterval(poll);
      msg.className = 'err';
      msg.textContent = 'Timed out waiting for server to restart. Try refreshing.';
      btn.disabled = false;
      checkStatus();
    }
  }, 1000);
}

// Poll every 15s
checkStatus();
setInterval(checkStatus, 15000);

// Stop polling when page unloads
window.addEventListener('beforeunload', () => {
  if (checkInterval) clearInterval(checkInterval);
});
</script>
</body>
</html>
