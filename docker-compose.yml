version: "3.9"

# ── Common configuration ──────────────────────────────────
x-common: &common
  build:
    context: .
    dockerfile: Dockerfile
  image: tabula-rasa:latest
  environment:
    - PYTHONUNBUFFERED=1
    - PYTHONDONTWRITEBYTECODE=1
  restart: unless-stopped
  volumes:
    - tabula_rasa_specialists:/app/specialists
    - tabula_rasa_data:/app/data
    - tabula_rasa_exports:/app/exports
    - tabula_rasa_memory:/app/memory

x-common-gpu: &common-gpu
  <<: *common
  build:
    context: .
    dockerfile: Dockerfile.gpu
  image: tabula-rasa:gpu
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]

services:
  # ── API Server ──────────────────────────────────────────
  api-server:
    <<: *common
    profiles: ["cpu", "gpu", "minimal"]
    container_name: tabula-rasa-api
    ports:
      - "8000:8000"
    command: ["python", "api_server.py"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: "4G"

  # ── GPU API Server ──────────────────────────────────────
  api-server-gpu:
    <<: *common-gpu
    profiles: ["gpu"]
    container_name: tabula-rasa-api-gpu
    ports:
      - "8000:8000"
    command: ["python", "api_server.py"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── Sleep Cycle Daemon ──────────────────────────────────
  sleep-cycle:
    <<: *common
    profiles: ["cpu", "gpu"]
    container_name: tabula-rasa-sleep
    command: ["python", "egefalos/sleep_cycle.py", "--daemon", "--interval", "3600"]
    depends_on:
      api-server:
        condition: service_healthy

  sleep-cycle-gpu:
    <<: *common-gpu
    profiles: ["gpu"]
    container_name: tabula-rasa-sleep-gpu
    command: ["python", "egefalos/sleep_cycle.py", "--daemon", "--interval", "3600"]

  # ── P2P Swarm Daemon ────────────────────────────────────
  p2p-swarm:
    <<: *common
    profiles: ["cpu", "gpu"]
    container_name: tabula-rasa-p2p
    ports:
      - "9000:9000"
    command: ["python", "egefalos/p2p_daemon.py", "--port", "9000"]
    network_mode: host

  # ── Self-Improvement Daemon ─────────────────────────────
  self-improve:
    <<: *common
    profiles: ["cpu", "gpu"]
    container_name: tabula-rasa-self-improve
    command: ["python", "egefalos/self_improve.py", "--daemon", "--interval", "7200", "--problems", "100", "--train-steps", "300"]

  self-improve-gpu:
    <<: *common-gpu
    profiles: ["gpu"]
    container_name: tabula-rasa-self-improve-gpu
    command: ["python", "egefalos/self_improve.py", "--daemon", "--interval", "7200"]

volumes:
  tabula_rasa_specialists:
  tabula_rasa_data:
  tabula_rasa_exports:
  tabula_rasa_memory:
